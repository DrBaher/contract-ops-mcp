name: Publish to npm
# OIDC Trusted Publishing — NO long-lived token.
#
# One-time setup on npmjs.com (already required before the first OIDC publish):
#   package `contract-ops-mcp` → Settings → Trusted Publisher → GitHub Actions
#   organization/user = DrBaher · repository = contract-ops-mcp
#   workflow filename = publish.yml · environment = (leave blank)
#
# IMPORTANT: do NOT add `registry-url:` to actions/setup-node. With it, setup-node
# writes a placeholder NODE_AUTH_TOKEN into .npmrc and npm sends *that* instead of
# fetching an OIDC token — the masked-401/404 that blocked compare/draft. Without
# it, npm >= 11.5.1 performs Trusted Publishing via the id-token below.
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: ensure npm >= 11.5.1 (OIDC support)
        run: npm install -g npm@latest && npm --version
      - run: npm install --no-audit --no-fund
      - run: npm test
      - name: verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"; exit 1
          fi
      - run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — npm mints a short-lived OIDC token via id-token:write.

  publish-mcp-registry:
    # Publishes server.json to the official MCP Registry so discovery surfaces
    # track the current version. GitHub OIDC proves io.github.DrBaher ownership —
    # no secrets. Runs after npm publish (the registry validates the published
    # npm tarball's mcpName against the server name).
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
